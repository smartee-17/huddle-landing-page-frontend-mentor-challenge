<body class="flex-column">


  <main>

    <!-- Image and header area -->
    <div class="image-head-area flex-column">
      <img 
      src="./images/logo.svg" 
      alt="Huddle Logo" 
      class="logo"
      height="50px"
      width="50px"
      >

      <img 
      src="./images/illustration-mockups.svg" 
      alt="illustration-mockups"
      class="ill-mockups"
      height="100px"
      width="100px"
      >
    </div>

    <!-- write up area -->
    <article class="flex-column">
      <div class="write-up flex-column">

        <h1>
          Build The Community Your Fans Will Love
        </h1>

        <p>  
          Huddle re-imagines the way we build communities. You have a voice, but so does your audience. 
          Create connections with your users as you engage in genuine discussion. 
        </p>

        <button>
          Register
        </button>
      </div>
    </article>


  </main>

  <script>
    const mobileRange = 768;
    const footer = document.querySelector('.js-footer');

    (function () {
      if (window.innerWidth <= mobileRange){
        footer.classList.replace('flex-row', 'flex-column-reverse');
      }

      let resizeTimeout;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout)

        resizeTimeout = setTimeout(() => {
          if (window.innerWidth <= mobileRange){
            footer.classList.replace('flex-row', 'flex-column-reverse');
          } else {
            footer.classList.replace('flex-column-reverse', 'flex-row');
          }
        }, 120)

      })
    })()

    

  </script>
